<header class="box-surface page-header">
	<h3>Pulpit</h3>
	<div class="line-spacer"></div>
	<h1>Finanse osobiste w jednym miejscu</h1>
	<p class="lead">Szybkie porównanie bieżącego i poprzedniego miesiąca.</p>
</header>
<section class="content-grid content-grid-2"
		 data-module="/js/pages/dashboard.js">
	<div class="box-surface box-wrapper">
		<section class="dashboard-period">
			<h2>Bieżący miesiąc</h2>
			<div aria-label="Podsumowanie bieżącego miesiąca"
				 class="summary-panel"
				 id="currentMonthSummary">
				<div class="summary-line">
					<span>Dochody</span>
					<strong data-dashboard-value="income">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Wydatki</span>
					<strong data-dashboard-value="expenses">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Saldo</span>
					<strong data-dashboard-value="balance">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Transakcje</span>
					<strong data-dashboard-value="transactionsCount">0</strong>
				</div>
			</div>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<section class="dashboard-period">
			<h2>Poprzedni miesiąc</h2>
			<div aria-label="Podsumowanie poprzedniego miesiąca"
				 class="summary-panel"
				 id="previousMonthSummary">
				<div class="summary-line">
					<span>Dochody</span>
					<strong data-dashboard-value="income">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Wydatki</span>
					<strong data-dashboard-value="expenses">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Saldo</span>
					<strong data-dashboard-value="balance">0,00 zł</strong>
				</div>
				<div class="summary-line">
					<span>Transakcje</span>
					<strong data-dashboard-value="transactionsCount">0</strong>
				</div>
			</div>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<div class="hero-actions">
			<a class="button"
			   href="#/transactions">Dodaj transakcję</a>
			<a class="button"
			   href="#/reports">Zobacz raporty</a>
		</div>
	</div>
</section>
