<header class="box-surface page-header">
	<h3>Budżety</h3>
	<h1>Planowanie miesięcznych limitów</h1>
	<p class="lead">Budżet można tworzyć dla bieżącego miesiąca i maksymalnie 12 miesięcy w przód.</p>
</header>
<section class="content-grid content-grid-2">
	<div class="box-surface box-wrapper">
		<section class="form-panel">
			<h2>Budżet miesiąca</h2>
			<form class="app-form">
				<div class="form-field">
					<label for="budgetMonth">Miesiąc</label>
					<input id="budgetMonth"
						   max="12"
						   min="1"
						   type="number"
						   value="5">
				</div>
				<div class="form-field">
					<label for="budgetYear">Rok</label>
					<input id="budgetYear"
						   min="1900"
						   type="number"
						   value="2026">
				</div>
				<div class="form-field">
					<label for="budgetAmount">Limit</label>
					<input id="budgetAmount"
						   min="0"
						   placeholder="0.00"
						   step="0.01"
						   type="number">
				</div>
				<button class="button"
						type="button">Zapisz budżet
				</button>
			</form>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<section>
			<h2>Status</h2>
			<p>Po podpięciu API pojawi się porównanie limitu z wydatkami miesiąca.</p>
			<div class="empty-state">Brak pobranego budżetu.</div>
		</section>
	</div>
</section>
