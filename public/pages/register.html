<header class="box-surface page-header">
	<h3>Rejestracja</h3>
	<h1>Utwórz konto</h1>
	<p class="lead">Załóż konto, żeby korzystać z budżetów, celów, transakcji i raportów finansowych.</p>
</header>
<section class="content-grid auth-content"
		 data-module="/js/pages/register.js">
	<div class="box-surface box-wrapper auth-panel">
		<section class="form-panel">
			<form class="app-form"
				  id="registerForm"
				  novalidate>
				<span class="form-error form-general-error"
					  data-form-error></span>
				<div class="form-field">
					<label for="registerLogin">Login <span class="required-marker">*</span></label>
					<input autocomplete="username"
						   id="registerLogin"
						   maxlength="20"
						   minlength="6"
						   name="login"
						   required
						   title="Login: 6-20 znaków. Dozwolone litery, cyfry oraz znak _. "
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="login"
						  id="registerLoginError"></span>
				</div>
				<div class="form-field">
					<label for="registerEmail">E-mail <span class="required-marker">*</span></label>
					<input autocomplete="email"
						   id="registerEmail"
						   name="email"
						   required
						   title="Podaj poprawny adres e-mail."
						   type="email">
					<span class="form-error form-field-error"
						  data-field-error-for="email"
						  id="registerEmailError"></span>
				</div>
				<div class="form-field">
					<label for="registerPassword">Hasło <span class="required-marker">*</span></label>
					<input autocomplete="new-password"
						   id="registerPassword"
						   minlength="8"
						   name="password"
						   required
						   title="Hasło: minimum 8 znaków, mała i duża litera, cyfra oraz znak specjalny !@#$%^&*()_+-=? ."
						   type="password">
					<span class="form-error form-field-error"
						  data-field-error-for="password"
						  id="registerPasswordError"></span>
				</div>
				<div class="form-actions">
					<button class="button"
							type="submit">Zarejestruj
					</button>
					<button class="button"
							id="clearRegister"
							type="button">Wyczyść
					</button>
				</div>
			</form>
		</section>
	</div>
</section>
