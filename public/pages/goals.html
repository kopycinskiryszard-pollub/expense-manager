<header class="box-surface page-header">
	<h3>Cele</h3>
	<h1>Cele oszczędnościowe</h1>
	<p class="lead">Twórz cele, aktualizuj zebraną kwotę i zamykaj zbiórki po osiągnięciu celu.</p>
</header>
<section class="content-grid content-grid-2">
	<div class="box-surface box-wrapper">
		<section class="form-panel">
			<h2>Nowy cel</h2>
			<form class="app-form">
				<div class="form-field">
					<label for="goalName">Nazwa</label>
					<input id="goalName"
						   maxlength="100"
						   type="text"></div>
				<div class="form-field">
					<label for="goalAmount">Kwota docelowa</label>
					<input id="goalAmount"
						   min="0.01"
						   step="0.01"
						   type="number"></div>
				<div class="form-field">
					<label for="goalDeadline">Termin</label>
					<input id="goalDeadline"
						   type="date"></div>
				<div class="form-field">
					<label for="goalDescription">Opis</label>
					<textarea id="goalDescription"
							  maxlength="1000"></textarea>
				</div>
				<button class="button"
						type="button">Dodaj cel
				</button>
			</form>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<section>
			<h2>Aktywne cele</h2>
			<ul class="data-list">
				<li class="data-list-item">
					<span>Brak aktywnych celów</span>
					<span class="badge">0%</span>
				</li>
			</ul>
		</section>
	</div>
</section>
