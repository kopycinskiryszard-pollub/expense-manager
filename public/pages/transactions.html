<header class="box-surface page-header">
	<h3>Transakcje</h3>
	<h1>Lista dochodów i wydatków</h1>
	<p class="lead">Dodawaj, edytuj i usuwaj transakcje oraz przeglądaj je z podstawowym filtrowaniem.</p>
</header>
<section class="content-grid transactions-content"
		 data-module="/js/pages/transactions.js">
	<div class="box-surface box-wrapper">
		<section class="form-panel transaction-form-panel">
			<h2 id="transactionFormTitle">Dodaj transakcję</h2>
			<form class="app-form transaction-form"
				  id="transactionForm"
				  novalidate>
				<span class="form-error form-general-error"
					  data-form-error></span>
				<input id="transactionId"
					   name="id"
					   type="hidden">
				<div class="form-field">
					<label for="transactionName">Nazwa <span class="required-marker">*</span></label>
					<input id="transactionName"
						   maxlength="30"
						   name="name"
						   required
						   title="Nazwa: od 1 do 30 znaków."
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="name"
						  id="transactionNameError"></span>
				</div>
				<div class="transaction-form-row transaction-form-details">
					<div class="form-field transaction-category-field">
						<label for="transactionCategory">Kategorie <span class="required-marker">*</span>
							<span aria-label="Typ kategorii transakcji"
								  class="category-type-switch"
								  data-type-switch="transaction">
								(
								<span aria-pressed="false"
									  class="type-switch-button"
									  data-type-value="0"
									  role="button"
									  tabindex="0">dochody</span>
								/
								<span aria-pressed="true"
									  class="type-switch-button"
									  data-type-value="1"
									  role="button"
									  tabindex="0">wydatki</span>
								)
							</span>
						</label>
						<select id="transactionCategory"
								name="categoryId"
								required
								title="Wybierz kategorię transakcji.">
							<option value="">Wybierz kategorię</option>
						</select>
						<span class="form-error form-field-error"
							  data-field-error-for="categoryId"
							  id="transactionCategoryError"></span>
					</div>
					<div class="form-field transaction-amount-field">
						<label for="transactionAmount">Kwota <span class="required-marker">*</span></label>
						<input id="transactionAmount"
							   inputmode="decimal"
							   maxlength="10"
							   name="amount"
							   placeholder="0.00"
							   required
							   title="Kwota: od 0.01 do 9999999.99, maksymalnie 2 miejsca po kropce."
							   type="text">
						<span class="form-error form-field-error"
							  data-field-error-for="amount"
							  id="transactionAmountError"></span>
					</div>
					<div class="form-field transaction-date-field">
						<label for="transactionDate">Data <span class="required-marker">*</span></label>
						<input id="transactionDate"
							   name="date"
							   required
							   title="Data: format RRRR-MM-DD, nie późniejsza niż dzisiaj."
							   type="date">
						<span class="form-error form-field-error"
							  data-field-error-for="date"
							  id="transactionDateError"></span>
					</div>
				</div>
				<div class="form-field">
					<label for="transactionDescription">Opis</label>
					<textarea id="transactionDescription"
							  maxlength="300"
							  name="description"
							  rows="4"
							  title="Opis: maksymalnie 300 znaków."></textarea>
					<span class="form-error form-field-error"
						  data-field-error-for="description"
						  id="transactionDescriptionError"></span>
				</div>
				<div class="form-actions">
					<button class="button"
							type="submit">Zapisz
					</button>
					<button class="button"
							id="clearTransactionForm"
							type="button">Wyczyść
					</button>
				</div>
			</form>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<form class="app-form transaction-filter-form"
			  id="transactionFilters"
			  novalidate>
			<span class="form-error form-general-error"
				  data-form-error></span>
			<div class="toolbar transaction-filter-toolbar">
				<div class="form-field">
					<label for="filterMonth">Miesiąc</label>
					<select class="compact-select"
							id="filterMonth"
							name="month">
						<option value="">Wszystkie</option>
					</select>
					<span class="form-error form-field-error"
						  data-field-error-for="month"
						  id="filterMonthError"></span>
				</div>
				<div class="form-field">
					<label for="filterYear">Rok</label>
					<select class="compact-select"
							id="filterYear"
							name="year">
						<option value="">Wszystkie</option>
					</select>
					<span class="form-error form-field-error"
						  data-field-error-for="year"
						  id="filterYearError"></span>
				</div>
				<div class="form-field transaction-filter-category">
					<label for="filterCategory">Kategorie
						<span aria-label="Typ kategorii filtra"
							  class="category-type-switch"
							  data-type-switch="filter">
							(
							<span aria-pressed="true"
								  class="type-switch-button"
								  data-type-value=""
								  role="button"
								  tabindex="0">wszystkie</span>
							/
							<span aria-pressed="false"
								  class="type-switch-button"
								  data-type-value="0"
								  role="button"
								  tabindex="0">dochody</span>
							/
							<span aria-pressed="false"
								  class="type-switch-button"
								  data-type-value="1"
								  role="button"
								  tabindex="0">wydatki</span>
							)
						</span>
					</label>
					<input id="filterType"
						   name="type"
						   type="hidden"
						   value="">
					<select id="filterCategory"
							name="categoryId">
						<option value="">Wszystkie</option>
					</select>
					<span class="form-error form-field-error"
						  data-field-error-for="categoryId"
						  id="filterCategoryError"></span>
				</div>
				<div class="form-field">
					<label for="filterSort">Sortowanie</label>
					<select id="filterSort"
							name="sort">
						<option value="date_desc">Data ↓</option>
						<option value="date_asc">Data ↑</option>
						<option value="amount_desc">Kwota ↓</option>
						<option value="amount_asc">Kwota ↑</option>
					</select>
					<span class="form-error form-field-error"
						  data-field-error-for="sort"
						  id="filterSortError"></span>
				</div>
				<div class="form-actions transaction-filter-actions">
					<button class="button"
							type="submit">Filtruj
					</button>
					<button class="button"
							id="clearTransactionFilters"
							type="button">Wyczyść
					</button>
				</div>
			</div>
		</form>
		<div class="table-wrap">
			<table class="transactions-table">
				<thead>
				<tr>
					<th>Data</th>
					<th>Nazwa</th>
					<th>Kategoria</th>
					<th>Kwota</th>
					<th>Opis</th>
					<th>Akcje</th>
				</tr>
				</thead>
				<tbody id="transactionsTableBody">
				<tr>
					<td colspan="6">Ładowanie transakcji...</td>
				</tr>
				</tbody>
			</table>
		</div>
		<div class="toolbar">
			<button class="button"
					id="previousTransactionsPage"
					type="button">Poprzednia
			</button>
			<span id="transactionsPageInfo">Strona 1 z 1</span>
			<button class="button"
					id="nextTransactionsPage"
					type="button">Następna
			</button>
		</div>
	</div>
</section>
