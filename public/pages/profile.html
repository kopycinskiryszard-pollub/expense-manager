<header class="box-surface page-header">
	<h3>Profil</h3>
	<div class="line-spacer"></div>
	<h1>Dane użytkownika</h1>
	<p class="lead">Aktualizacja danych dodatkowych i zmiana hasła konta.</p>
	<p>Login: <strong class="profile-identity-value"
			   id="profileLogin">-</strong>, e-mail: <strong class="profile-identity-value"
			   id="profileEmail">-</strong></p>
</header>
<section class="content-grid content-grid-2"
		 data-module="/js/pages/profile.js">
	<div class="box-surface box-wrapper">
		<section class="form-panel profile-form-panel">
			<h2>Dodatkowe dane</h2>
			<div class="line-spacer"></div>
			<form class="app-form"
				  id="profileForm"
				  novalidate>
				<span class="form-error form-general-error"
					  data-form-error></span>
				<div class="form-field">
					<label for="profileName">Imię</label>
					<input id="profileName"
						   maxlength="50"
						   name="name"
						   title="Imię: maksymalnie 50 znaków."
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="name"
						  id="profileNameError"></span>
				</div>
				<div class="form-field">
					<label for="profileSurname">Nazwisko</label>
					<input id="profileSurname"
						   maxlength="50"
						   name="surname"
						   title="Nazwisko: maksymalnie 50 znaków."
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="surname"
						  id="profileSurnameError"></span>
				</div>
				<div class="form-field">
					<label for="profileBirthdate">Data urodzenia</label>
					<input id="profileBirthdate"
						   name="birthdate"
						   title="Data: format RRRR-MM-DD, nie późniejsza niż dzisiaj."
						   type="date">
					<span class="form-error form-field-error"
						  data-field-error-for="birthdate"
						  id="profileBirthdateError"></span>
				</div>
				<div class="form-field">
					<label for="profileCity">Miasto</label>
					<input id="profileCity"
						   maxlength="100"
						   name="city"
						   title="Miasto: maksymalnie 100 znaków."
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="city"
						  id="profileCityError"></span>
				</div>
				<div class="form-field">
					<label for="profileCountry">Kraj</label>
					<input id="profileCountry"
						   maxlength="100"
						   name="country"
						   title="Kraj: maksymalnie 100 znaków."
						   type="text">
					<span class="form-error form-field-error"
						  data-field-error-for="country"
						  id="profileCountryError"></span>
				</div>
				<div class="form-actions">
					<button class="button"
							type="submit">Zapisz profil
					</button>
				</div>
			</form>
		</section>
	</div>
	<div class="box-surface box-wrapper">
		<section class="form-panel profile-form-panel">
			<h2>Zmiana hasła</h2>
			<div class="line-spacer"></div>
			<form class="app-form"
				  id="passwordForm"
				  novalidate>
				<span class="form-error form-general-error"
					  data-form-error></span>
				<div class="form-field">
					<label for="currentPassword">Aktualne hasło <span class="required-marker">*</span></label>
					<input autocomplete="current-password"
						   id="currentPassword"
						   name="currentPassword"
						   required
						   title="Hasło: minimum 8 znaków, duża i mała litera, cyfra oraz znak specjalny."
						   type="password">
					<span class="form-error form-field-error"
						  data-field-error-for="currentPassword"
						  id="currentPasswordError"></span>
				</div>
				<div class="form-field">
					<label for="newPassword">Nowe hasło <span class="required-marker">*</span></label>
					<input autocomplete="new-password"
						   id="newPassword"
						   name="newPassword"
						   required
						   title="Hasło: minimum 8 znaków, duża i mała litera, cyfra oraz znak specjalny."
						   type="password">
					<span class="form-error form-field-error"
						  data-field-error-for="newPassword"
						  id="newPasswordError"></span>
				</div>
				<div class="form-field">
					<label for="confirmPassword">Powtórz nowe hasło <span class="required-marker">*</span></label>
					<input autocomplete="new-password"
						   id="confirmPassword"
						   name="confirmPassword"
						   required
						   title="Wpisz ponownie nowe hasło."
						   type="password">
					<span class="form-error form-field-error"
						  data-field-error-for="confirmPassword"
						  id="confirmPasswordError"></span>
				</div>
				<div class="form-field">
					<label for="confirmPasswordChange">Potwierdzenie zmiany <span class="required-marker">*</span></label>
					<label class="checkbox-field"
						   for="confirmPasswordChange">
						<input id="confirmPasswordChange"
							   name="confirmChange"
							   required
							   type="checkbox"
							   value="yes">
						<span>Potwierdzam zmianę hasła.</span>
					</label>
					<span class="form-error form-field-error"
						  data-field-error-for="confirmChange"
						  id="confirmPasswordChangeError"></span>
				</div>
				<div class="form-actions">
					<button class="button"
							type="submit">Zmień hasło
					</button>
				</div>
			</form>
		</section>
	</div>
</section>
